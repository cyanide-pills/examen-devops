services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: tienda_despachos
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -prootpass --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ventas-api:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: ventas-api
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: tienda_despachos
      DB_USERNAME: appuser
      DB_PASSWORD: apppassword
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  despachos-api:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: despachos-api
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: tienda_despachos
      DB_USERNAME: appuser
      DB_PASSWORD: apppassword
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8081"
    restart: unless-stopped

  frontend:
    build:
      context: ./front_despacho
    container_name: front-despacho
    depends_on:
      - ventas-api
      - despachos-api
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  mysql-data:
