name: CI/CD Examen DevOps EKS

on:
  push:
    branches: [deploy]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  ECR_REPO_FRONTEND: frontend
  ECR_REPO_VENTAS: ventas-backend
  ECR_REPO_DESPACHOS: despacho-backend
  ECR_REPO_DB: database

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Detectar cambios
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'front_despacho/**'
            ventas:
              - 'back-Ventas_SpringBoot/**'
            despachos:
              - 'back-Despachos_SpringBoot/**'
            db:
              - 'db/**'
            k8s:
              - 'k8s/**'

      - name: Decidir si se requiere despliegue
        id: deploy-check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || \
             [[ "${{ steps.changes.outputs.frontend }}" == "true" ]] || \
             [[ "${{ steps.changes.outputs.ventas }}" == "true" ]] || \
             [[ "${{ steps.changes.outputs.despachos }}" == "true" ]] || \
             [[ "${{ steps.changes.outputs.db }}" == "true" ]] || \
             [[ "${{ steps.changes.outputs.k8s }}" == "true" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Definir etiqueta de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Construir y publicar imagen de la API de Ventas
        if: steps.changes.outputs.ventas == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: back-Ventas_SpringBoot/Springboot-API-REST
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_VENTAS }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y publicar imagen de la API de Despachos
        if: steps.changes.outputs.despachos == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_DESPACHOS }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y publicar imagen del frontend
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: front_despacho
          build-args: |
            VITE_VENTAS_API_URL=/api/v1/ventas
            VITE_DESPACHOS_API_URL=/api/v1/despachos
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_FRONTEND }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Construir y publicar imagen de MySQL
        if: steps.changes.outputs.db == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: db
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_DB }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"
          kubectl config current-context

      - name: Desplegar manifiestos y actualizar imágenes
        if: steps.deploy-check.outputs.should_deploy == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          NS="${EKS_NAMESPACE:-examen-devops}"

          kubectl apply -f k8s/00-namespace.yaml

          kubectl -n "$NS" create secret generic mysql-secret \
            --from-literal=MYSQL_ROOT_PASSWORD="$MYSQL_ROOT_PASSWORD" \
            --from-literal=MYSQL_DATABASE="$MYSQL_DATABASE" \
            --from-literal=MYSQL_USER="$MYSQL_USER" \
            --from-literal=MYSQL_PASSWORD="$MYSQL_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/03-mysql-deployment.yaml -n "$NS"
          kubectl apply -f k8s/04-mysql-service.yaml -n "$NS"

          kubectl apply -f k8s/05-ventas-deployment.yaml -n "$NS"
          kubectl apply -f k8s/06-ventas-service.yaml -n "$NS"

          kubectl apply -f k8s/07-despachos-deployment.yaml -n "$NS"
          kubectl apply -f k8s/08-despachos-service.yaml -n "$NS"

          kubectl apply -f k8s/frontend-nginx-config.yaml -n "$NS"
          kubectl apply -f k8s/09-frontend-deployment.yaml -n "$NS"
          kubectl apply -f k8s/10-frontend-service.yaml -n "$NS"

          kubectl apply -f k8s/11-hpa.yaml -n "$NS"
          kubectl apply -f k8s/12-ingress.yaml -n "$NS"

          kubectl set image deployment/ventas-api \
            ventas-api=${ECR_REGISTRY}/${ECR_REPO_VENTAS}:${IMAGE_TAG} \
            -n "$NS"

          kubectl set image deployment/despachos-api \
            despachos-api=${ECR_REGISTRY}/${ECR_REPO_DESPACHOS}:${IMAGE_TAG} \
            -n "$NS"

          kubectl set image deployment/front-despacho \
            front-despacho=${ECR_REGISTRY}/${ECR_REPO_FRONTEND}:${IMAGE_TAG} \
            -n "$NS"

          kubectl set image deployment/mysql \
            mysql=${ECR_REGISTRY}/${ECR_REPO_DB}:${IMAGE_TAG} \
            -n "$NS"

          kubectl rollout status deployment/ventas-api -n "$NS"
          kubectl rollout status deployment/despachos-api -n "$NS"
          kubectl rollout status deployment/front-despacho -n "$NS"
          kubectl rollout status deployment/mysql -n "$NS"

      - name: Mostrar estado del clúster
        if: steps.deploy-check.outputs.should_deploy == 'true'
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          NS="${EKS_NAMESPACE:-examen-devops}"
          kubectl get pods -n "$NS"
          kubectl get svc -n "$NS"
          kubectl get ingress -n "$NS"
          kubectl get hpa -n "$NS" || true
